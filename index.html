<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Автовышка</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --blue:#2563EB;--blue-l:#EFF6FF;--blue-m:#DBEAFE;
  --green:#10B981;--green-l:#ECFDF5;
  --red:#EF4444;--red-l:#FEF2F2;
  --orange:#F59E0B;--orange-l:#FFFBEB;
  --purple:#8B5CF6;--purple-l:#F5F3FF;
  --grey:#94A3B8;
  --bg:#F1F5F9;--card:#fff;
  --text:#0F172A;--text2:#334155;--muted:#64748B;
  --border:#E2E8F0;
}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);min-height:100vh;padding-bottom:80px;}

/* HEADER */
header{
  background:linear-gradient(135deg,#1E40AF,#2563EB 60%,#0EA5E9);
  padding:14px 16px 12px;
  position:sticky;top:0;z-index:100;
}
.h-row{display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
.logo span{opacity:0.65;font-size:11px;font-weight:500;display:block;letter-spacing:0.3px;margin-top:1px;}
.h-date{font-size:11px;color:rgba(255,255,255,0.75);font-weight:500;text-align:right;}
.h-count{font-size:20px;font-weight:800;color:#fff;text-align:right;line-height:1;}

/* STATS ROW */
.stats{display:flex;gap:8px;padding:12px 14px 4px;overflow-x:auto;scrollbar-width:none;}
.stats::-webkit-scrollbar{display:none;}
.stat{background:var(--card);border-radius:12px;padding:10px 14px;min-width:100px;flex-shrink:0;border:1px solid var(--border);}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;}
.stat-val{font-size:22px;font-weight:800;letter-spacing:-0.5px;line-height:1.2;}
.stat-val.blue{color:var(--blue);}
.stat-val.green{color:var(--green);}
.stat-val.orange{color:var(--orange);}
.stat-val.purple{color:var(--purple);}

/* SEARCH */
.search-wrap{padding:10px 14px 6px;position:relative;}
.search-ico{position:absolute;left:24px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none;}
.search-input{
  width:100%;padding:10px 14px 10px 36px;
  background:var(--card);border:1.5px solid var(--border);
  border-radius:12px;font-size:15px;color:var(--text);
  outline:none;font-family:inherit;
  -webkit-appearance:none;
}
.search-input:focus{border-color:var(--blue);}

/* FILTER CHIPS */
.chips{display:flex;gap:7px;padding:6px 14px 10px;overflow-x:auto;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{
  white-space:nowrap;padding:7px 14px;border-radius:20px;
  font-size:12px;font-weight:600;border:1.5px solid var(--border);
  background:var(--card);color:var(--muted);cursor:pointer;flex-shrink:0;
  -webkit-appearance:none;transition:all .15s;
}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff;}

/* DRIVER CHIPS */
.driver-chips{display:flex;gap:7px;padding:0 14px 10px;overflow-x:auto;scrollbar-width:none;}
.driver-chips::-webkit-scrollbar{display:none;}
.dchip{
  white-space:nowrap;padding:5px 12px;border-radius:20px;
  font-size:12px;font-weight:600;border:1.5px solid var(--border);
  background:var(--card);color:var(--muted);cursor:pointer;flex-shrink:0;
}
.dchip.on{background:var(--blue-m);border-color:var(--blue);color:var(--blue);}

/* CARDS */
.cards{padding:4px 14px 10px;}
.card{
  background:var(--card);border-radius:14px;margin-bottom:10px;
  border:1px solid var(--border);overflow:hidden;position:relative;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.card-stripe{position:absolute;left:0;top:0;bottom:0;width:4px;}
.s-green{background:var(--green);}
.s-red{background:var(--red);}
.s-yellow{background:var(--orange);}
.s-purple{background:var(--purple);}
.s-blue{background:var(--blue);}

.card-body{padding:12px 14px 12px 18px;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.card-num{font-size:10px;color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums;}
.card-date{font-size:12px;font-weight:700;color:var(--text2);}
.card-addr{font-size:15px;font-weight:700;color:var(--text);margin:5px 0 8px;line-height:1.3;}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--bg);color:var(--text2);}
.tag.m{background:var(--blue-m);color:var(--blue);}
.tag.t{background:var(--green-l);color:#059669;}
.tag.ov{background:var(--orange-l);color:#D97706;}
.tag.km{background:var(--purple-l);color:var(--purple);}
.card-foot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:9px;}
.driver{display:flex;align-items:center;gap:8px;}
.ava{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#0EA5E9);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ava.maruf{background:linear-gradient(135deg,#10B981,#059669);}
.ava.umar{background:linear-gradient(135deg,#2563EB,#0EA5E9);}
.ava.talbak{background:linear-gradient(135deg,#F59E0B,#EF4444);}
.dname{font-size:12px;font-weight:600;color:var(--text2);}
.disp{font-size:10px;color:var(--muted);}
.price{font-size:17px;font-weight:800;color:var(--green);}

/* BADGE */
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.b-green{background:var(--green-l);color:#059669;}
.b-red{background:var(--red-l);color:#DC2626;}
.b-yellow{background:var(--orange-l);color:#D97706;}
.b-purple{background:var(--purple-l);color:var(--purple);}
.b-blue{background:var(--blue-m);color:var(--blue);}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-ico{font-size:40px;margin-bottom:10px;}

/* PAGER */
.pager{display:flex;align-items:center;gap:10px;padding:6px 14px 14px;}
.pager button{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;}
.pager button:disabled{opacity:0.35;}
.pager-info{flex:2;text-align:center;font-size:12px;color:var(--muted);font-weight:500;}

/* BOTTOM NAV */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom,0);
  z-index:200;
}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 6px;cursor:pointer;}
.bni-ico{font-size:22px;line-height:1;}
.bni-lbl{font-size:10px;font-weight:600;color:var(--muted);}
.bni.on .bni-lbl{color:var(--blue);}

/* TAB VIEWS */
.view{display:none;}
.view.on{display:block;}

/* ANALYTICS */
.analytics{padding:12px 14px 14px;}
.acard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.acard h4{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;}
.arow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.arow:last-child{border-bottom:none;}
.arow .nm{color:var(--text2);font-weight:500;}
.arow .vl{font-weight:700;color:var(--blue);font-variant-numeric:tabular-nums;}
.bar{background:var(--border);height:4px;margin-top:4px;border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),#0EA5E9);border-radius:2px;}
</style>
</head>
<body>

<header>
  <div class="h-row">
    <div class="logo">🏗️ Автовышка<span>Диспетчерская</span></div>
    <div>
      <div class="h-count" id="hCount">52</div>
      <div class="h-date">заказов всего</div>
    </div>
  </div>
</header>

<!-- STATS -->
<div class="stats" id="statsRow"></div>

<!-- ЗАКАЗЫ VIEW -->
<div class="view on" id="vOrders">
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input class="search-input" type="search" placeholder="Адрес, машина, водитель..." id="q" oninput="render()">
  </div>
  <div class="chips">
    <div class="chip on" onclick="setStatus('',this)">Все</div>
    <div class="chip" onclick="setStatus('Не оплачен',this)">Не оплачен</div>
    <div class="chip" onclick="setStatus('Оплачен',this)">Оплачен</div>
    <div class="chip" onclick="setStatus('Счёт выставлен',this)">Счёт выст.</div>
    <div class="chip" onclick="setStatus('На проверке',this)">На проверке</div>
  </div>
  <div class="driver-chips">
    <div class="dchip on" onclick="setDriver('',this)">Все водители</div>
    <div class="dchip" onclick="setDriver('Маруф',this)">Маруф</div>
    <div class="dchip" onclick="setDriver('Умар',this)">Умар</div>
    <div class="dchip" onclick="setDriver('Талбак',this)">Талбак</div>
  </div>
  <div class="cards" id="cardsList"></div>
  <div class="pager">
    <button id="bPrev" onclick="changePage(-1)">← Пред</button>
    <div class="pager-info" id="pInfo"></div>
    <button id="bNext" onclick="changePage(1)">След →</button>
  </div>
</div>

<!-- АНАЛИТИКА VIEW -->
<div class="view" id="vAnalytics">
  <div class="analytics" id="analyticsContent"></div>
</div>

<!-- НИЖНЯЯ НАВИГАЦИЯ -->
<nav class="bnav">
  <div class="bni on" onclick="switchTab('orders',this)">
    <div class="bni-ico">📋</div>
    <div class="bni-lbl">Заказы</div>
  </div>
  <div class="bni" onclick="switchTab('analytics',this)">
    <div class="bni-ico">📊</div>
    <div class="bni-lbl">Аналитика</div>
  </div>
</nav>

let page = 1, statusF = '', driverF = '';
const PER = 20;

function n(v){ return parseFloat(v)||0; }
function toISO(d){
  if(!d) return '';
  const p = d.split('.');
  return p.length===3 ? `${p[2]}-${p[1]}-${p[0]}` : d;
}

function filtered(){
  const q = (document.getElementById('q').value||'').toLowerCase();
  return DATA.filter(o=>{
    if(statusF && o.status !== statusF) return false;
    if(driverF && o.driver !== driverF) return false;
    if(q && !`${o.address} ${o.machine} ${o.driver} ${o.dispatcher}`.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b)=> toISO(b.date).localeCompare(toISO(a.date)));
}

function stripe(s){ return {Оплачен:'s-green','Не оплачен':'s-red','На проверке':'s-yellow','Счёт выставлен':'s-purple'}[s]||'s-blue'; }
function badge(s){  return {Оплачен:'b-green','Не оплачен':'b-red','На проверке':'b-yellow','Счёт выставлен':'b-purple'}[s]||'b-blue'; }
function avaClass(d){ return {Маруф:'maruf',Умар:'umar',Талбак:'talbak'}[d]||''; }
function initials(d){ if(!d) return '?'; const p=d.trim().split(/\s+/); return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():d.slice(0,2).toUpperCase(); }

function render(){
  const data = filtered();
  const total = Math.max(1, Math.ceil(data.length/PER));
  if(page>total) page=1;
  const slice = data.slice((page-1)*PER, page*PER);
  const list = document.getElementById('cardsList');
  const info = document.getElementById('pInfo');
  document.getElementById('bPrev').disabled = page<=1;
  document.getElementById('bNext').disabled = page>=total;
  info.textContent = `${page} / ${total}  (${data.length})`;
  document.getElementById('hCount').textContent = data.length;

  if(!slice.length){
    list.innerHTML='<div class="empty"><div class="empty-ico">📭</div><div>Ничего не найдено</div></div>';
    return;
  }
  list.innerHTML = slice.map(o=>{
    const price = n(o.price);
    const over  = n(o.pererab);
    return `<div class="card">
      <div class="card-stripe ${stripe(o.status)}"></div>
      <div class="card-body">
        <div class="card-top">
          <div>
            <div class="card-num">#${o.id}</div>
            <div class="card-date">${o.date}</div>
          </div>
          <span class="badge ${badge(o.status)}">${o.status}</span>
        </div>
        <div class="card-addr">${o.address}</div>
        <div class="tags">
          ${o.machine ? `<span class="tag m">🚛 ${o.machine}</span>` : ''}
          ${o.height  ? `<span class="tag">📏 ${o.height}м</span>` : ''}
          ${(o.start||o.end) ? `<span class="tag t">🕐 ${o.start}–${o.end}</span>` : ''}
          ${o.smena   ? `<span class="tag">⏱ ${o.smena}ч</span>` : ''}
          ${over>0    ? `<span class="tag ov">⚡ +${o.pererab}ч</span>` : ''}
        </div>
        <div class="card-foot">
          <div class="driver">
            <div class="ava ${avaClass(o.driver)}">${initials(o.driver)}</div>
            <div>
              <div class="dname">${o.driver||'—'}</div>
              ${o.dispatcher?`<div class="disp">${o.dispatcher}</div>`:''}
            </div>
          </div>
          <div class="price">${price>0 ? price.toLocaleString('ru-RU')+' ₽' : '—'}</div>
        </div>
        ${o.note?`<div style="margin-top:8px;padding-top:7px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)">💬 ${o.note}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function setStatus(s, el){
  statusF=s; page=1;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on'); render();
}
function setDriver(d, el){
  driverF=d; page=1;
  document.querySelectorAll('.dchip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on'); render();
}
function changePage(d){ page=Math.max(1,page+d); render(); }

function switchTab(tab, el){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.bni').forEach(b=>b.classList.remove('on'));
  document.getElementById(tab==='orders'?'vOrders':'vAnalytics').classList.add('on');
  el.classList.add('on');
  if(tab==='analytics') renderAnalytics();
}

function renderStats(){
  const total = DATA.length;
  const revenue = DATA.reduce((s,o)=>s+n(o.price),0);
  const paid = DATA.filter(o=>o.status==='Оплачен').length;
  const over = DATA.filter(o=>n(o.pererab)>0).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="stat-lbl">Заказов</div><div class="stat-val blue">${total}</div></div>
    <div class="stat"><div class="stat-lbl">Выручка</div><div class="stat-val green">${(revenue/1000).toFixed(0)}к ₽</div></div>
    <div class="stat"><div class="stat-lbl">Оплачено</div><div class="stat-val orange">${paid}</div></div>
    <div class="stat"><div class="stat-lbl">Переработки</div><div class="stat-val purple">${over}</div></div>
  `;
}

function renderAnalytics(){
  const byDriver={}, byMachine={}, byMonth={};
  DATA.forEach(o=>{
    const p=n(o.price);
    // водители
    if(!byDriver[o.driver]) byDriver[o.driver]={cnt:0,rev:0};
    byDriver[o.driver].cnt++; byDriver[o.driver].rev+=p;
    // машины
    if(!byMachine[o.machine]) byMachine[o.machine]={cnt:0,rev:0};
    byMachine[o.machine].cnt++; byMachine[o.machine].rev+=p;
    // месяцы
    const iso=toISO(o.date); const mon=iso.slice(0,7);
    if(!byMonth[mon]) byMonth[mon]={cnt:0,rev:0};
    byMonth[mon].cnt++; byMonth[mon].rev+=p;
  });

  function rows(obj, key, fmt){
    const arr=Object.entries(obj).sort((a,b)=>b[1][key]-a[1][key]);
    const max=arr[0]?arr[0][1][key]:1;
    return arr.map(([name,d])=>`
      <div class="arow">
        <div>
          <div class="nm">${name||'—'}</div>
          <div class="bar"><div class="bar-fill" style="width:${Math.round(d[key]/max*100)}%"></div></div>
        </div>
        <div class="vl">${fmt(d)}</div>
      </div>`).join('');
  }

  document.getElementById('analyticsContent').innerHTML = `
    <div class="acard">
      <h4>👷 По водителям</h4>
      ${rows(byDriver,'rev',d=>d.rev.toLocaleString('ru-RU')+' ₽')}
    </div>
    <div class="acard">
      <h4>🚛 По машинам</h4>
      ${rows(byMachine,'cnt',d=>d.cnt+' заказов')}
    </div>
    <div class="acard">
      <h4>📅 По месяцам</h4>
      ${rows(byMonth,'rev',d=>d.rev.toLocaleString('ru-RU')+' ₽')}
    </div>
  `;
}

renderStats();
render();
</script>
</body>
</html>
