<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Автовышка</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --blue:#2563EB;--blue-l:#EFF6FF;--blue-m:#DBEAFE;
  --green:#10B981;--green-l:#ECFDF5;
  --red:#EF4444;--red-l:#FEF2F2;
  --orange:#F59E0B;--orange-l:#FFFBEB;
  --purple:#8B5CF6;--purple-l:#F5F3FF;
  --bg:#F1F5F9;--card:#fff;
  --text:#0F172A;--text2:#334155;--muted:#64748B;
  --border:#E2E8F0;
}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);min-height:100vh;padding-bottom:80px;}

/* HEADER */
header{background:linear-gradient(135deg,#1E40AF,#2563EB 60%,#0EA5E9);padding:14px 16px 12px;position:sticky;top:0;z-index:100;}
.h-row{display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.3px;display:flex;align-items:center;gap:9px;}
.logo-icon{background:rgba(255,255,255,.2);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.h-right{display:flex;align-items:center;gap:8px;}
.sync-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.4);}
.sync-dot.ok{background:#34D399;}
.sync-dot.spin{background:#FCD34D;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* STATS */
.stats{display:flex;gap:8px;padding:12px 14px 4px;overflow-x:auto;scrollbar-width:none;}
.stats::-webkit-scrollbar{display:none;}
.stat{background:var(--card);border-radius:12px;padding:10px 14px;min-width:95px;flex-shrink:0;border:1px solid var(--border);}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;}
.stat-val{font-size:20px;font-weight:800;letter-spacing:-0.5px;line-height:1.2;}
.stat-val.blue{color:var(--blue);}
.stat-val.green{color:var(--green);}
.stat-val.orange{color:var(--orange);}
.stat-val.red{color:var(--red);}

/* SEARCH */
.search-wrap{padding:10px 14px 0;position:relative;}
.search-ico{position:absolute;left:24px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:15px;}
.search-input{width:100%;padding:10px 14px 10px 36px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;font-size:15px;color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none;}
.search-input:focus{border-color:var(--blue);}

/* FILTER CHIPS */
.chips{display:flex;gap:7px;padding:8px 14px;overflow-x:auto;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{white-space:nowrap;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;flex-shrink:0;}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff;}

/* DRIVER CHIPS */
.dchips{display:flex;gap:7px;padding:0 14px 10px;overflow-x:auto;scrollbar-width:none;}
.dchips::-webkit-scrollbar{display:none;}
.dchip{white-space:nowrap;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;flex-shrink:0;}
.dchip.on{background:var(--blue-m);border-color:var(--blue);color:var(--blue);}

/* CARDS */
.cards{padding:4px 14px 10px;}
.card{background:var(--card);border-radius:14px;margin-bottom:10px;border:1px solid var(--border);overflow:hidden;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.card-stripe{position:absolute;left:0;top:0;bottom:0;width:4px;}
.s-green{background:var(--green);}
.s-red{background:var(--red);}
.s-yellow{background:var(--orange);}
.s-purple{background:var(--purple);}
.s-blue{background:var(--blue);}
.card-body{padding:12px 14px 12px 18px;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.card-num{font-size:10px;color:var(--muted);font-weight:600;}
.card-date{font-size:12px;font-weight:700;color:var(--text2);}
.card-addr{font-size:15px;font-weight:700;color:var(--text);margin:5px 0 8px;line-height:1.3;}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--bg);color:var(--text2);}
.tag.blue{background:var(--blue-m);color:var(--blue);}
.tag.green{background:var(--green-l);color:#059669;}
.tag.orange{background:var(--orange-l);color:#D97706;}
.tag.purple{background:var(--purple-l);color:var(--purple);}
.card-foot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:9px;}
.driver{display:flex;align-items:center;gap:8px;}
.ava{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#0EA5E9);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ava.maruf{background:linear-gradient(135deg,#10B981,#059669);}
.ava.umar{background:linear-gradient(135deg,#2563EB,#0EA5E9);}
.ava.talbak{background:linear-gradient(135deg,#F59E0B,#EF4444);}
.dname{font-size:12px;font-weight:600;color:var(--text2);}
.disp{font-size:10px;color:var(--muted);}
.price{font-size:17px;font-weight:800;color:var(--green);}
.card-note{margin-top:8px;padding-top:7px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);line-height:1.4;}

/* BADGE */
.badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;cursor:pointer;border:none;display:inline-block;}
.b-green{background:var(--green-l);color:#059669;}
.b-red{background:var(--red-l);color:#DC2626;}
.b-yellow{background:var(--orange-l);color:#D97706;}
.b-purple{background:var(--purple-l);color:var(--purple);}
.b-blue{background:var(--blue-m);color:var(--blue);}

/* EMPTY / LOADING */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-ico{font-size:40px;margin-bottom:10px;}
.empty-txt{font-size:14px;font-weight:600;}

/* PAGER */
.pager{display:flex;align-items:center;gap:10px;padding:4px 0 14px;}
.pager button{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;}
.pager button:disabled{opacity:0.35;}
.pager-info{flex:2;text-align:center;font-size:12px;color:var(--muted);font-weight:500;}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:200;}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 7px;cursor:pointer;}
.bni-ico{font-size:22px;line-height:1;}
.bni-lbl{font-size:10px;font-weight:600;color:var(--muted);}
.bni.on .bni-lbl{color:var(--blue);}

/* VIEWS */
.view{display:none;}
.view.on{display:block;}

/* ANALYTICS */
.analytics{padding:12px 14px 14px;}
.acard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.acard h4{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;}
.arow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.arow:last-child{border-bottom:none;}
.arow .nm{color:var(--text2);font-weight:500;}
.arow .vl{font-weight:700;color:var(--blue);}
.bar{background:var(--border);height:4px;margin-top:4px;border-radius:2px;overflow:hidden;}
.bar-f{height:100%;background:linear-gradient(90deg,var(--blue),#0EA5E9);border-radius:2px;}

/* SETUP */
.setup-box{margin:12px 14px;background:var(--card);border:1.5px solid var(--blue-m);border-radius:14px;padding:16px;}
.setup-box h3{font-size:14px;font-weight:700;color:var(--blue);margin-bottom:10px;}
.setup-input{width:100%;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;font-size:13px;outline:none;font-family:inherit;color:var(--text);margin-bottom:10px;}
.setup-input:focus{border-color:var(--blue);}
.setup-btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;color:#fff;z-index:999;animation:toastIn .3s ease;white-space:nowrap;}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
.toast.info{background:var(--blue);}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
</style>
</head>
<body>

<header>
  <div class="h-row">
    <div class="logo"><div class="logo-icon">🏗️</div>Автовышка</div>
    <div class="h-right">
      <div class="sync-btn" onclick="syncData()" id="syncBtn">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncLbl">Обновить</span>
      </div>
    </div>
  </div>
</header>

<!-- ЗАКАЗЫ -->
<div class="view on" id="vOrders">
  <div class="stats" id="statsRow"></div>
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input class="search-input" type="search" placeholder="ID, адрес, машина, водитель..." id="q" oninput="render()">
  </div>
  <div class="chips">
    <div class="chip on" onclick="setStatus('',this)">Все</div>
    <div class="chip" onclick="setStatus('Не оплачен',this)">Не оплачен</div>
    <div class="chip" onclick="setStatus('Оплачен',this)">Оплачен</div>
    <div class="chip" onclick="setStatus('Счёт выставлен',this)">Счёт выст.</div>
    <div class="chip" onclick="setStatus('На проверке',this)">На проверке</div>
  </div>
  <div class="dchips">
    <div class="dchip on" onclick="setDriver('',this)">Все водители</div>
    <div class="dchip" onclick="setDriver('Маруф',this)">Маруф</div>
    <div class="dchip" onclick="setDriver('Умар',this)">Умар</div>
    <div class="dchip" onclick="setDriver('Талбак',this)">Талбак</div>
  </div>
  <div class="cards">
    <div id="cardsList"></div>
    <div class="pager">
      <button id="bPrev" onclick="changePage(-1)">← Пред</button>
      <div class="pager-info" id="pInfo"></div>
      <button id="bNext" onclick="changePage(1)">След →</button>
    </div>
  </div>
</div>

<!-- АНАЛИТИКА -->
<div class="view" id="vAnalytics">
  <div class="analytics" id="analyticsContent"></div>
</div>

<!-- НАСТРОЙКИ -->
<div class="view" id="vSettings">
  <div class="setup-box">
    <h3>🔗 Подключение к Google Sheets</h3>
    <input class="setup-input" type="url" id="urlInput" placeholder="https://script.google.com/macros/s/.../exec">
    <button class="setup-btn" onclick="connect()">Подключить</button>
  </div>
</div>

<!-- НИЖНЕЕ МЕНЮ -->
<nav class="bnav">
  <div class="bni on" onclick="switchTab('orders',this)">
    <div class="bni-ico">📋</div><div class="bni-lbl">Заказы</div>
  </div>
  <div class="bni" onclick="switchTab('analytics',this)">
    <div class="bni-ico">📊</div><div class="bni-lbl">Аналитика</div>
  </div>
  <div class="bni" onclick="switchTab('settings',this)">
    <div class="bni-ico">⚙️</div><div class="bni-lbl">Настройки</div>
  </div>
</nav>

<script>
const STORAGE_KEY = 'av_webAppUrl';
let DATA = [];
let page = 1, statusF = '', driverF = '';
const PER = 25;
let webAppUrl = localStorage.getItem(STORAGE_KEY) || '';

// ── HELPERS ──────────────────────────────────────────────────────
function n(v){ return parseFloat(String(v||'').replace(/[^\d.-]/g,''))||0; }

function toISO(d){
  if(!d) return '';
  const p = String(d).trim().split('.');
  return p.length===3 ? `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}` : d;
}

function fmtDate(d){
  if(!d) return '—';
  const s = String(d).trim();
  if(/^\d{2}\.\d{2}\.\d{4}$/.test(s)) return s;
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)){const[y,m,dd]=s.split('-');return`${dd}.${m}.${y}`;}
  return s;
}

function mapRow(r){
  const g = (keys) => { for(const k of keys){if(r[k]!==undefined&&r[k]!=='')return String(r[k]).trim();} return ''; };
  const gn = (keys) => { for(const k of keys){const v=parseFloat(r[k]);if(!isNaN(v))return v;} return 0; };
  // parse date
  let date = g(['Дата','date']);
  if(date && !/^\d{2}\.\d{2}\.\d{4}$/.test(date)){
    const d=new Date(date);
    if(!isNaN(d)){const dd=String(d.getDate()).padStart(2,'0'),mm=String(d.getMonth()+1).padStart(2,'0'),yy=d.getFullYear();date=`${dd}.${mm}.${yy}`;}
  }
  // parse time
  const parseTime = (v) => {
    if(!v&&v!==0) return '';
    const s=String(v).trim();
    if(/^\d{1,2}:\d{2}$/.test(s)) return s.padStart(5,'0');
    const d=new Date(s);
    if(!isNaN(d)) return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    return s;
  };
  const statusMap={'оплачен':'Оплачен','не оплачен':'Не оплачен','счёт выставлен':'Счёт выставлен','счет выставлен':'Счёт выставлен','на проверке':'На проверке','на проверку':'На проверке'};
  const rawStatus = g(['Статус','status']);
  const status = statusMap[rawStatus.toLowerCase()] || rawStatus || 'Не оплачен';
  return {
    id:       g(['ID','id']),
    date,
    height:   g(['Высота вышки','height']),
    address:  g(['Адрес','address']),
    schet:    g(['№ счета','schet']),
    machine:  g(['Номер машины','machine']),
    driver:   g(['Водитель','driver']),
    dispatcher: g(['Диспетчер','dispatcher']),
    start:    parseTime(r['Начало']||r['start']||''),
    end:      parseTime(r['Конец']||r['end']||''),
    smena:    gn(['Смена (ч)','smena']),
    pererab:  gn(['Переработка','pererab']),
    km:       gn(['КМ','km']),
    price:    gn(['Итого цена','price']),
    status,
    note:     g(['Примечание','note']),
  };
}

// ── SYNC ─────────────────────────────────────────────────────────
function setSyncUI(state){
  const dot=document.getElementById('syncDot');
  const lbl=document.getElementById('syncLbl');
  if(state==='ok'){dot.className='sync-dot ok';lbl.textContent='Подключено';}
  else if(state==='loading'){dot.className='sync-dot spin';lbl.textContent='Загрузка...';}
  else{dot.className='sync-dot';lbl.textContent='Обновить';}
}

async function connect(){
  const url = document.getElementById('urlInput').value.trim();
  if(!url||!url.includes('script.google.com')){showToast('Введи корректный URL','error');return;}
  webAppUrl = url;
  localStorage.setItem(STORAGE_KEY, url);
  await syncData();
}

async function syncData(){
  if(!webAppUrl){showToast('Сначала укажи URL в Настройках','error');return;}
  setSyncUI('loading');
  try{
    const res = await fetch(webAppUrl);
    const json = await res.json();
    if(json.ok && json.data){
      DATA = json.data.map(mapRow).filter(r=>r.id);
      renderStats();
      render();
      if(document.getElementById('vAnalytics').classList.contains('on')) renderAnalytics();
      setSyncUI('ok');
      showToast('✅ Обновлено: '+DATA.length+' записей','success');
    } else {
      setSyncUI('error');showToast('Ошибка данных','error');
    }
  } catch(e){
    setSyncUI('');showToast('Ошибка подключения','error');
  }
}

async function postToSheets(body){
  if(!webAppUrl) return;
  try{ await fetch(webAppUrl,{method:'POST',body:JSON.stringify(body)}); } catch(e){}
}

// ── STATUS CYCLE ─────────────────────────────────────────────────
async function cycleStatus(id){
  const o = DATA.find(x=>String(x.id)===String(id));
  if(!o) return;
  const cycle=['Не оплачен','На проверке','Счёт выставлен','Оплачен'];
  const idx = cycle.indexOf(o.status);
  o.status = cycle[(idx+1)%cycle.length];
  render();renderStats();
  await postToSheets({
    action:'update',
    id:o.id, date:o.date, height:o.height, address:o.address, schet:o.schet,
    machine:o.machine, driver:o.driver, dispatcher:o.dispatcher,
    start:o.start, end:o.end, smena:o.smena, pererab:o.pererab,
    km:o.km, price:o.price, status:o.status, note:o.note
  });
  showToast('✅ '+o.status,'success');
}

// ── FILTER / RENDER ───────────────────────────────────────────────
function filtered(){
  const q = (document.getElementById('q').value||'').toLowerCase();
  return DATA.filter(o=>{
    if(statusF && o.status !== statusF) return false;
    if(driverF && o.driver !== driverF) return false;
    if(q && !`${o.id} ${o.address} ${o.machine} ${o.driver} ${o.dispatcher}`.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b)=> toISO(b.date).localeCompare(toISO(a.date)));
}

function stripe(s){ return {Оплачен:'s-green','Не оплачен':'s-red','На проверке':'s-yellow','Счёт выставлен':'s-purple'}[s]||'s-blue'; }
function badgeCls(s){ return {Оплачен:'b-green','Не оплачен':'b-red','На проверке':'b-yellow','Счёт выставлен':'b-purple'}[s]||'b-blue'; }
function avaClass(d){ return {Маруф:'maruf',Умар:'umar',Талбак:'talbak'}[d]||''; }
function initials(d){ if(!d) return '?'; const p=d.trim().split(/\s+/); return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():d.slice(0,2).toUpperCase(); }

function render(){
  const data = filtered();
  const total = Math.max(1, Math.ceil(data.length/PER));
  if(page>total) page=1;
  const slice = data.slice((page-1)*PER, page*PER);
  const list = document.getElementById('cardsList');
  document.getElementById('bPrev').disabled = page<=1;
  document.getElementById('bNext').disabled = page>=total;
  document.getElementById('pInfo').textContent = `${page} / ${total}  (${data.length})`;

  if(!DATA.length){
    list.innerHTML = webAppUrl
      ? '<div class="empty"><div class="empty-ico">⏳</div><div class="empty-txt">Нажми Обновить</div></div>'
      : '<div class="empty"><div class="empty-ico">🔗</div><div class="empty-txt">Настрой подключение</div></div>';
    return;
  }
  if(!slice.length){
    list.innerHTML='<div class="empty"><div class="empty-ico">📭</div><div class="empty-txt">Ничего не найдено</div></div>';
    return;
  }

  list.innerHTML = slice.map(o=>{
    const price = n(o.price);
    const over  = n(o.pererab);
    const km    = n(o.km);
    return `<div class="card">
      <div class="card-stripe ${stripe(o.status)}"></div>
      <div class="card-body">
        <div class="card-top">
          <div>
            <div class="card-num">#${o.id}${o.schet?' · сч.'+o.schet:''}</div>
            <div class="card-date">${fmtDate(o.date)}</div>
          </div>
          <span class="badge ${badgeCls(o.status)}" onclick="cycleStatus('${o.id}')" title="Нажми для смены">${o.status}</span>
        </div>
        <div class="card-addr">${o.address||'—'}</div>
        <div class="tags">
          ${o.machine?`<span class="tag blue">🚛 ${o.machine}</span>`:''}
          ${o.height?`<span class="tag">📏 ${o.height}м</span>`:''}
          ${(o.start||o.end)?`<span class="tag green">🕐 ${o.start||'?'}–${o.end||'?'}</span>`:''}
          ${o.smena?`<span class="tag">⏱ ${o.smena}ч</span>`:''}
          ${over>0?`<span class="tag orange">⚡ +${o.pererab}ч</span>`:''}
          ${km>0?`<span class="tag purple">📍 ${o.km}км</span>`:''}
        </div>
        <div class="card-foot">
          <div class="driver">
            <div class="ava ${avaClass(o.driver)}">${initials(o.driver)}</div>
            <div>
              <div class="dname">${o.driver||'—'}</div>
              ${o.dispatcher?`<div class="disp">${o.dispatcher}</div>`:''}
            </div>
          </div>
          <div class="price">${price>0?price.toLocaleString('ru-RU')+' ₽':'—'}</div>
        </div>
        ${o.note&&o.note.trim()?`<div class="card-note">💬 ${o.note}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function setStatus(s,el){
  statusF=s;page=1;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');render();
}
function setDriver(d,el){
  driverF=d;page=1;
  document.querySelectorAll('.dchip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');render();
}
function changePage(d){page=Math.max(1,page+d);render();}

// ── STATS ────────────────────────────────────────────────────────
function renderStats(){
  const total=DATA.length;
  const revenue=DATA.reduce((s,o)=>s+n(o.price),0);
  const unpaid=DATA.filter(o=>o.status==='Не оплачен').length;
  const paid=DATA.filter(o=>o.status==='Оплачен').length;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat"><div class="stat-lbl">Заказов</div><div class="stat-val blue">${total}</div></div>
    <div class="stat"><div class="stat-lbl">Выручка</div><div class="stat-val green">${(revenue/1000).toFixed(0)}к ₽</div></div>
    <div class="stat"><div class="stat-lbl">Не оплачен</div><div class="stat-val red">${unpaid}</div></div>
    <div class="stat"><div class="stat-lbl">Оплачено</div><div class="stat-val orange">${paid}</div></div>
  `;
}

// ── ANALYTICS ────────────────────────────────────────────────────
function renderAnalytics(){
  const byDriver={},byMachine={},byMonth={},byStatus={};
  DATA.forEach(o=>{
    const p=n(o.price);
    if(!byDriver[o.driver]) byDriver[o.driver]={cnt:0,rev:0};
    byDriver[o.driver].cnt++;byDriver[o.driver].rev+=p;
    if(!byMachine[o.machine]) byMachine[o.machine]={cnt:0,rev:0};
    byMachine[o.machine].cnt++;byMachine[o.machine].rev+=p;
    const mon=toISO(o.date).slice(0,7);
    if(mon.match(/^\d{4}-\d{2}$/)){if(!byMonth[mon])byMonth[mon]={cnt:0,rev:0};byMonth[mon].cnt++;byMonth[mon].rev+=p;}
    if(!byStatus[o.status])byStatus[o.status]={cnt:0,rev:0};
    byStatus[o.status].cnt++;byStatus[o.status].rev+=p;
  });
  function rows(obj,key,fmt){
    const arr=Object.entries(obj).sort((a,b)=>b[1][key]-a[1][key]);
    const max=arr[0]?arr[0][1][key]:1;
    return arr.map(([name,d])=>`<div class="arow"><div><div class="nm">${name||'—'}</div><div class="bar"><div class="bar-f" style="width:${Math.round(d[key]/max*100)}%"></div></div></div><div class="vl">${fmt(d)}</div></div>`).join('');
  }
  const mn=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
  const monthRows=Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0])).map(([m,d])=>{
    const[y,mo]=m.split('-');const max=Math.max(...Object.values(byMonth).map(x=>x.rev))||1;
    return`<div class="arow"><div><div class="nm">${mn[+mo-1]||''} ${y}</div><div class="bar"><div class="bar-f" style="width:${Math.round(d.rev/max*100)}%"></div></div></div><div class="vl">${d.rev.toLocaleString('ru-RU')} ₽</div></div>`;
  }).join('');
  document.getElementById('analyticsContent').innerHTML=`
    <div class="acard"><h4>👷 По водителям</h4>${rows(byDriver,'rev',d=>d.rev.toLocaleString('ru-RU')+' ₽')}</div>
    <div class="acard"><h4>🚛 По машинам</h4>${rows(byMachine,'cnt',d=>d.cnt+' заказов')}</div>
    <div class="acard"><h4>📅 По месяцам</h4>${monthRows}</div>
    <div class="acard"><h4>✅ По статусам</h4>${rows(byStatus,'cnt',d=>d.cnt+' зак.')}</div>
  `;
}

// ── TABS ─────────────────────────────────────────────────────────
function switchTab(tab,el){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.bni').forEach(b=>b.classList.remove('on'));
  document.getElementById('v'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('on');
  el.classList.add('on');
  if(tab==='analytics') renderAnalytics();
  if(tab==='settings' && webAppUrl) document.getElementById('urlInput').value=webAppUrl;
}

// ── TOAST ────────────────────────────────────────────────────────
function showToast(msg,type='info'){
  const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},2500);
}

// ── INIT ─────────────────────────────────────────────────────────
renderStats();
render();
if(webAppUrl){
  document.getElementById('urlInput').value=webAppUrl;
  syncData();
}
</script>
</body>
</html>
